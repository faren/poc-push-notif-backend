server:
  http_listen_port: 9080
  grpc_listen_port: 0

positions:
  filename: /tmp/positions.yaml

clients:
  - url: http://loki:3100/loki/api/v1/push

scrape_configs:
  - job_name: push-notif-backend
    static_configs:
      - targets:
          - localhost
        labels:
          job: push-notif-backend
          app: push-notif-backend
          __path__: /logs/*.log

    pipeline_stages:
      # Parse log format:
      # 2026-04-19 10:30:00 [http-nio-8080-exec-1] INFO  c.p.p.s.NotificationServiceImpl - [NOTIF-LOG] status: SENT, category: PROMOTION, id: msg-001
      - regex:
          expression: '^(?P<timestamp>\d{4}-\d{2}-\d{2} \d{2}:\d{2}:\d{2}) \[(?P<thread>[^\]]+)\] (?P<level>\w+)\s+\S+ - (?P<message>.*)$'

      - labels:
          level:

      # For [NOTIF-LOG] lines: extract status and category as labels
      - match:
          selector: '{job="push-notif-backend"}'
          stages:
            - regex:
                expression: '\[NOTIF-LOG\] status: (?P<status>\w+), category: (?P<category>\w+)'
                source: message
            - labels:
                status:
                category:
